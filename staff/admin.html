<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#002868">
  <title>NSL Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/staff.css">
</head>
<body>
  <div class="bar">
    <div class="title-block">
      <a href="index.html" class="back" title="Staff Tools">←</a>
      <h1>NSL · Admin<span class="sub" id="title-suffix"></span></h1>
    </div>
    <div class="meta" id="me"></div>
  </div>

  <div class="wrap">
    <!-- Pallets list view -->
    <section id="view-list">
      <div class="row" style="align-items:flex-end;margin-bottom:16px;">
        <div class="col field">
          <label for="new-name">New pallet name (optional — auto-numbered if blank)</label>
          <input type="text" id="new-name" placeholder="e.g., Tuesday Truck Apparel Pallet"/>
        </div>
        <button id="new-pallet" class="btn btn-primary">+ New Pallet</button>
      </div>
      <div class="gallery" id="pallets"></div>
    </section>

    <!-- Pallet detail view -->
    <section id="view-detail" hidden>
      <button id="back" class="btn btn-ghost" style="margin-bottom:16px;">← All pallets</button>

      <div class="row">
        <div class="col" style="min-width:300px;flex:0 0 360px;">
          <div class="card">
            <div id="pallet-photo" class="thumb" style="aspect-ratio:1/1;background:#F0EAD6 repeating-linear-gradient(45deg, #E5DDC4 0, #E5DDC4 2px, #F0EAD6 2px, #F0EAD6 10px);background-size:cover;background-position:center;"></div>
            <input type="file" id="photo-input" accept="image/*" capture="environment" style="margin-top:12px;"/>
            <button id="photo-upload" class="btn btn-yellow" style="width:100%;margin-top:8px;" disabled>Upload pallet photo</button>
          </div>

          <div class="card" style="margin-top:16px;">
            <h3 style="margin:0 0 12px;font-family:Anton;letter-spacing:0.02em;text-transform:uppercase;">Sell mode</h3>
            <div class="mode-toggle">
              <button data-mode="lot"        class="btn btn-secondary">Sell as Lot</button>
              <button data-mode="individual" class="btn btn-secondary">Individualize</button>
              <button data-mode="mixed"      class="btn btn-secondary">Mixed</button>
            </div>
            <p style="margin:12px 0 0;font-size:13px;color:#666;">Currently: <b id="cur-mode">—</b></p>
          </div>

          <div class="card" style="margin-top:16px;">
            <div class="field">
              <label for="dn">Display name</label>
              <input type="text" id="dn"/>
            </div>
            <div class="field">
              <label for="notes">Notes</label>
              <textarea id="notes" rows="3"></textarea>
            </div>
            <button id="save-meta" class="btn btn-secondary" style="width:100%;">Save</button>
          </div>

          <div class="card" style="margin-top:16px;">
            <h3 style="margin:0 0 8px;font-family:Anton;letter-spacing:0.02em;text-transform:uppercase;">Stats</h3>
            <pre id="stats" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#444;margin:0;white-space:pre-wrap;"></pre>
            <button id="set-active" class="btn btn-yellow" style="width:100%;margin-top:8px;">Make this the active pallet for receiving</button>
          </div>
        </div>

        <div class="col">
          <h3 style="font-family:Anton;letter-spacing:0.02em;text-transform:uppercase;">Items <span id="items-count" style="font-size:14px;color:#666;font-family:'JetBrains Mono',monospace;"></span></h3>
          <div class="items-list" id="items"></div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
